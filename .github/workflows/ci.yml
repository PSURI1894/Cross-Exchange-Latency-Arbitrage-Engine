name: Latency Arbitrage Engine CI
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3 verilator
    - name: Build and Test
      run: |
        mkdir build
        cd build
        cmake ..
        make -j$(nproc)
        ctest
